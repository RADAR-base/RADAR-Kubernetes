cloudnative_postgresql:
  mode: recovery
  recovery:
    method: import
    import:
      type: monolith
      databases:
        # Remove any database that is not needed.
        - managementportal
        - appconfig
        - appserver
        - kratos
        - restsourceauthorizer
        - uploadconnector
      source:
        host: postgresql
        username: postgres
        database: postgres
        sslMode: prefer
        passwordSecret:
          create: false
          name: postgresql
          key: postgres-password

radar_jdbc_connector_grafana:
  radar-cloudnative-timescaledb:
    cluster:
      mode: recovery
      recovery:
        method: import
        import:
          type: monolith
          databases:
            - grafana-metrics
          source:
            host: grafana-metrics-timescaledb-postgresql
            username: postgres
            database: postgres
            sslMode: prefer
            passwordSecret:
              create: false
              name: grafana-metrics-timescaledb-postgresql
              key: postgres-password

