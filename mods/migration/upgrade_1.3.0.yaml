cloudnative_postgresql:
  _install: true
  mode: recovery
  recovery:
    method: import
    import:
      type: monolith
      databases:
        - managementportal
        - appconfig
        - appserver
        - kratos
        - restsourceauthorizer
        - uploadconnector
      source:
        host: postgresql
        username: postgres
        database: postgres
        sslMode: prefer
        passwordSecret:
          create: false
          name: postgresql
          key: postgres-password

radar_jdbc_connector_grafana:
  _install: false
  radar-cloudnative-timescaledb:
    enabled: true
    cluster:
      mode: recovery
      import:
        databases:
          - grafana-metrics
      source:
        host: grafana-metrics-timescaledb-postgresql
        username: postgres
        database: postgres
        sslMode: prefer
        passwordSecret:
          create: false
          name: grafana-metrics-timescaledb-postgresql
          key: postgres-password

# Install when data_dashboard_backend._install is 'true'.
radar_jdbc_connector_data_dashboard_backend:
  _install: false
  radar-cloudnative-timescaledb:
    enabled: true
    cluster:
      mode: recovery
      import:
        databases:
          - data-dashboard
        source:
          host: data-dashboard-timescaledb-postgresql
          username: postgres
          database: postgres
          sslMode: prefer
          passwordSecret:
            create: false
            name: data-dashboard-timescaledb-postgresql
            key: postgres-password

# Install when using realtime analysis
radar_jdbc_connector_realtime_dashboard:
  _install: false
  radar-cloudnative-timescaledb:
    enabled: true
    cluster:
      mode: recovery
      import:
        databases:
          - realtime-dashboard
        source:
          host: realtime-dashboard-timescaledb-postgresql
          username: postgres
          database: postgres
          sslMode: prefer
          passwordSecret:
            create: false
            name: realtime-dashboard-timescaledb-postgresql
            key: postgres-password
