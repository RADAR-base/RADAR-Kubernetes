bases:
- ../environments.yaml

---

{{ readFile "../etc/helmfile-templates.yaml" }}

releases:
  - name: mockserver-config
    namespace: mockserver
    chart: ../../radar-helm-charts/charts/radar-mockserver-config
#    chart: radar/radar-mockserver-config
    version: {{ .Values.mockserver_config._chart_version }}
    installed: {{ .Values.mockserver_config._install }}
    timeout: {{ add .Values.base_timeout .Values.mockserver_config._extra_timeout }}
    <<: *logFailedRelease
    values:
      - {{ .Values.mockserver_config | toYaml | indent 8 | trim }}

  - name: mockserver
    namespace: mockserver
    chart: ../../radar-helm-charts/external/mockserver
#    chart: radar/mockserver
    version: {{ .Values.mockserver._chart_version }}
    installed: {{ .Values.mockserver._install }}
    timeout: {{ add .Values.base_timeout .Values.mockserver._extra_timeout }}
    <<: *logFailedRelease
    needs:
      - mockserver-config
